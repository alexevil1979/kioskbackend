# Скопируйте нужные секции в config/settings.yaml
# Режим 2: POS Т-Банк + HS-K33 + облачная касса (без УМКА)

hardware:
  integration_mode: tbank_pos_printer
  printer:
    enabled: true
    connection: usb
    windows_name: "Generic / Text Only"
    windows_datatype: TEXT
    windows_encoding: cp1251
  tbank_terminal:
    host: "192.168.1.102"
    port: 27015
    smart_sale_enabled: true
    use_mock: true
  aqsi:
    use_mock: true

fiscal:
  enabled: true
  provider: cloudkassir
  use_mock: true
  cloud_public_id: ""
  cloud_api_secret: ""
